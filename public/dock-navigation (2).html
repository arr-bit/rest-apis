<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Liquid Glass Dock</title>
<style>
:root{
  --bg:#0A0A0A;
  --text:#F0F0F0;
  --text-mute:#7a7a7a;
  --glass-fill: linear-gradient(180deg, rgba(255,255,255,0.14), rgba(255,255,255,0.03) 55%, rgba(255,255,255,0.06));
  --glass-border: rgba(255,255,255,0.16);
  --item-fill: rgba(255,255,255,0.05);
  --item-fill-active: rgba(255,255,255,0.16);
  --green: #22C55E;
}

*{ box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color: transparent; }
html,body{ height:100%; }

body{
  font-family:'Manrope', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color:var(--text);
  min-height:100vh;
  overflow-x:hidden;
  position:relative;
}

/* ─── Background grid + ambient glow, matches site theme ─── */
.bg-grid{
  position:fixed; inset:0; z-index:0;
  background-image:
    linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
  background-size: 48px 48px;
  pointer-events:none;
}
.bg-orb{
  position:fixed;
  width:60vw; height:60vw; max-width:700px; max-height:700px;
  left:50%; bottom:-30vw;
  transform:translateX(-50%);
  background: radial-gradient(circle, rgba(255,255,255,0.10), transparent 70%);
  filter: blur(60px);
  pointer-events:none;
  z-index:0;
}

/* ─── Demo page content ─── */
.page{ position:relative; z-index:1; max-width:640px; margin:0 auto; padding:110px 28px 220px; text-align:center; }
.eyebrow{
  font-family:'JetBrains Mono', monospace; font-size:11px; letter-spacing:0.22em;
  color:var(--text-mute); text-transform:uppercase; margin-bottom:18px;
}
.title{ font-size: clamp(2.4rem, 8vw, 4.4rem); font-weight:800; line-height:1.05; letter-spacing:-0.02em; margin-bottom:18px; }
.title span{ color:transparent; -webkit-text-stroke:1.5px rgba(255,255,255,0.45); }
.sub{ font-size:14px; color:var(--text-mute); font-weight:300; line-height:1.8; max-width:440px; margin:0 auto; }

/* ─── Dock wrapper ─── */
.dock-wrap{
  position:fixed;
  left:0; right:0; bottom:0;
  display:flex;
  justify-content:center;
  padding-bottom: max(22px, env(safe-area-inset-bottom));
  z-index:1000;
  pointer-events:none;
}

/* ─── Reflection (moving mirror under the dock) ─── */
.dock-reflection{
  position:absolute;
  bottom:-2px;
  left:0;
  display:flex;
  align-items:flex-start;
  gap:8px;
  padding:12px 18px;
  border-radius:999px;
  transform: scaleY(-1) translateY(2px);
  -webkit-mask-image: linear-gradient(to top, rgba(0,0,0,0.30) 0%, transparent 75%);
  mask-image: linear-gradient(to top, rgba(0,0,0,0.30) 0%, transparent 75%);
  filter: blur(3px);
  opacity:0.55;
  pointer-events:none;
}
.dock-reflection .dock-item-r{
  width:52px; height:52px; border-radius:50%;
  background: rgba(255,255,255,0.10);
  display:flex; align-items:center; justify-content:center;
  transform-origin: top center;
  will-change: transform;
}
.dock-reflection .dock-item-r svg{ width:22px; height:22px; opacity:0.5; }

/* ─── The dock ─── */
.dock{
  position:relative;
  display:flex;
  align-items:flex-end;
  gap:8px;
  padding:12px 18px;
  border-radius:999px;
  background: var(--glass-fill);
  border:1px solid var(--glass-border);
  backdrop-filter: blur(50px) saturate(220%);
  -webkit-backdrop-filter: blur(50px) saturate(220%);
  box-shadow:
    0 24px 60px -10px rgba(0,0,0,0.65),
    0 4px 16px rgba(0,0,0,0.45),
    inset 0 1px 1px rgba(255,255,255,0.35),
    inset 0 -1px 6px rgba(0,0,0,0.35),
    inset 0 0 24px rgba(255,255,255,0.03);
  isolation:isolate;
  pointer-events:auto;
}

/* edge lighting sheen */
.dock::before{
  content:'';
  position:absolute;
  inset:0;
  border-radius:inherit;
  background: linear-gradient(115deg,
    rgba(255,255,255,0.45) 0%,
    rgba(255,255,255,0.06) 28%,
    rgba(255,255,255,0) 55%,
    rgba(255,255,255,0.03) 75%,
    rgba(255,255,255,0.22) 100%);
  mix-blend-mode: overlay;
  opacity:0.8;
  pointer-events:none;
  z-index:3;
  animation: sheenShift 9s ease-in-out infinite alternate;
}

/* ambient outer glow */
.dock::after{
  content:'';
  position:absolute;
  inset:-50%;
  border-radius:999px;
  background: radial-gradient(circle at 50% 130%, rgba(255,255,255,0.16), transparent 65%);
  filter: blur(28px);
  z-index:-1;
  pointer-events:none;
}

@keyframes sheenShift{
  0%   { background-position: 0% 0%; opacity:0.7; }
  50%  { background-position: 100% 0%; opacity:0.9; }
  100% { background-position: 0% 0%; opacity:0.7; }
}

/* cursor-tracked liquid highlight */
.dock-liquid{
  position:absolute;
  top:6px; bottom:6px;
  width:96px;
  border-radius:50%;
  background: radial-gradient(circle, rgba(255,255,255,0.30) 0%, rgba(255,255,255,0.06) 55%, transparent 80%);
  filter: blur(14px);
  opacity:0;
  pointer-events:none;
  z-index:1;
  will-change: transform, opacity;
}

/* active bubble indicator */
.dock-bubble{
  position:absolute;
  bottom:2px;
  width:6px; height:6px;
  border-radius:50%;
  background: var(--text);
  box-shadow: 0 0 10px rgba(255,255,255,0.9), 0 0 2px rgba(255,255,255,1);
  z-index:4;
  pointer-events:none;
  will-change: transform;
  transition: opacity 0.2s ease;
}

/* tooltip */
.dock-tooltip{
  position:absolute;
  top:-44px;
  left:0;
  transform: translate(-50%, 6px);
  background: rgba(20,20,20,0.85);
  border:1px solid rgba(255,255,255,0.12);
  backdrop-filter: blur(12px);
  color:var(--text);
  font-family:'JetBrains Mono', monospace;
  font-size:10px;
  letter-spacing:0.12em;
  text-transform:uppercase;
  padding:6px 12px;
  border-radius:8px;
  white-space:nowrap;
  opacity:0;
  pointer-events:none;
  transition: opacity 0.18s ease, transform 0.18s ease;
  z-index:5;
}
.dock-tooltip.show{ opacity:1; transform: translate(-50%, 0); }

/* dock item */
.dock-item{
  position:relative;
  z-index:2;
  width:52px;
  height:52px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  background: var(--item-fill);
  border:1px solid rgba(255,255,255,0.07);
  color:var(--text);
  cursor:pointer;
  text-decoration:none;
  transform-origin: 50% 100%;
  will-change: transform;
  transition: background 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease;
}
.dock-item::before{
  content:'';
  position:absolute;
  top:2px; left:6px; right:6px;
  height:42%;
  border-radius:50% 50% 60% 60% / 70% 70% 100% 100%;
  background: linear-gradient(180deg, rgba(255,255,255,0.35), rgba(255,255,255,0));
  opacity:0.6;
  pointer-events:none;
}
.dock-item svg{
  width:22px; height:22px;
  stroke:currentColor;
  fill:none;
  stroke-width:1.8;
  stroke-linecap:round;
  stroke-linejoin:round;
  position:relative; z-index:1;
  transition: transform 0.25s ease;
}
.dock-item:hover, .dock-item.active{
  background: var(--item-fill-active);
  border-color: rgba(255,255,255,0.18);
  box-shadow: 0 12px 28px rgba(0,0,0,0.45), inset 0 1px 1px rgba(255,255,255,0.5);
}
.dock-item.active{ color:#fff; }

/* ─── Responsive ─── */
@media (max-width:640px){
  .dock{ gap:4px; padding:10px 12px; }
  .dock-item{ width:46px; height:46px; }
  .dock-item svg{ width:20px; height:20px; }
  .dock-reflection .dock-item-r{ width:46px; height:46px; }
}

@media (prefers-reduced-motion: reduce){
  .dock::before{ animation:none; }
  .dock-item{ transition:none !important; }
}
</style>
</head>
<body>

<div class="bg-grid"></div>
<div class="bg-orb"></div>

<div class="page">
  <div class="eyebrow">— ARR Official REST API —</div>
  <div class="title">ARR<br><span>REST</span> API</div>
  <p class="sub">REST API sederhana, cepat, dan gratis untuk pengembangan project kamu.</p>
</div>

<div class="dock-wrap">
  <nav class="dock" id="dock" aria-label="Main navigation">
    <div class="dock-liquid" id="liquid"></div>
    <div class="dock-bubble" id="bubble"></div>
    <div class="dock-tooltip" id="tooltip"></div>

    <a class="dock-item active" href="#home" data-label="Home" data-index="0">
      <svg viewBox="0 0 24 24"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V20a1 1 0 0 0 1 1h4v-6h4v6h4a1 1 0 0 0 1-1V9.5"/></svg>
    </a>
    <a class="dock-item" href="#docs" data-label="Docs" data-index="1">
      <svg viewBox="0 0 24 24"><path d="M3 5a1.5 1.5 0 0 1 1.5-1.5H11V20H4.5A1.5 1.5 0 0 1 3 18.5Z"/><path d="M21 5a1.5 1.5 0 0 0-1.5-1.5H13V20h6.5A1.5 1.5 0 0 0 21 18.5Z"/></svg>
    </a>
    <a class="dock-item" href="#apis" data-label="APIs" data-index="2">
      <svg viewBox="0 0 24 24"><path d="M13 2 4 13.5h6.5L11 22l9-11.5h-6.5Z"/></svg>
    </a>
    <a class="dock-item" href="#donate" data-label="Donate" data-index="3">
      <svg viewBox="0 0 24 24"><path d="M12 20.5S3 15.2 3 9.2C3 6 5.4 4 8 4c1.8 0 3.2.9 4 2.4C12.8 4.9 14.2 4 16 4c2.6 0 5 2 5 5.2 0 6-9 11.3-9 11.3Z"/></svg>
    </a>
    <a class="dock-item" href="#about" data-label="About" data-index="4">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="3.6"/><path d="M4.5 20c.7-3.6 4-5.5 7.5-5.5s6.8 1.9 7.5 5.5"/></svg>
    </a>

    <!-- moving reflection, mirrors the dock items below the bar -->
    <div class="dock-reflection" id="reflection" aria-hidden="true">
      <div class="dock-item-r"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V20a1 1 0 0 0 1 1h4v-6h4v6h4a1 1 0 0 0 1-1V9.5"/></svg></div>
      <div class="dock-item-r"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 5a1.5 1.5 0 0 1 1.5-1.5H11V20H4.5A1.5 1.5 0 0 1 3 18.5Z"/><path d="M21 5a1.5 1.5 0 0 0-1.5-1.5H13V20h6.5A1.5 1.5 0 0 0 21 18.5Z"/></svg></div>
      <div class="dock-item-r"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2 4 13.5h6.5L11 22l9-11.5h-6.5Z"/></svg></div>
      <div class="dock-item-r"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20.5S3 15.2 3 9.2C3 6 5.4 4 8 4c1.8 0 3.2.9 4 2.4C12.8 4.9 14.2 4 16 4c2.6 0 5 2 5 5.2 0 6-9 11.3-9 11.3Z"/></svg></div>
      <div class="dock-item-r"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="3.6"/><path d="M4.5 20c.7-3.6 4-5.5 7.5-5.5s6.8 1.9 7.5 5.5"/></svg></div>
    </div>
  </nav>
</div>

<script>
(function(){
  const dock      = document.getElementById('dock');
  const items     = [...document.querySelectorAll('.dock-item')];
  const reflItems = [...document.querySelectorAll('.dock-item-r')];
  const liquid    = document.getElementById('liquid');
  const bubble    = document.getElementById('bubble');
  const tooltip   = document.getElementById('tooltip');

  const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  const MAX_SCALE = 1.35;   // peak magnification
  const MAX_LIFT  = 18;     // px translateY at peak
  const RANGE     = 95;     // px radius of influence on neighbours

  // spring state per item
  const state = items.map(() => ({ scale: 1, lift: 0, tScale: 1, tLift: 0 }));

  // cache geometry (dock is fixed/flex, layout doesn't shift with transforms)
  let centers = [];
  let dockRect = null;

  function measure(){
    dockRect = dock.getBoundingClientRect();
    centers = items.map(it => {
      const r = it.getBoundingClientRect();
      return r.left + r.width / 2 - dockRect.left;
    });
  }
  measure();
  window.addEventListener('resize', measure);

  let pointerX = null;            // x relative to dock, null = no hover
  let liquidX = 0, liquidTargetX = 0;
  let liquidOp = 0, liquidTargetOp = 0;
  let bubbleX = centers[0] || 0, bubbleTarget = bubbleX;
  let activeIndex = 0;

  function setTargets(){
    items.forEach((it, i) => {
      if (pointerX === null){
        state[i].tScale = 1;
        state[i].tLift  = 0;
        return;
      }
      const dist = Math.abs(pointerX - centers[i]);
      const influence = Math.max(0, 1 - dist / RANGE);
      const eased = influence * influence * (3 - 2 * influence); // smoothstep
      state[i].tScale = 1 + (MAX_SCALE - 1) * eased;
      state[i].tLift  = -MAX_LIFT * eased;
    });
  }

  function setActive(i){
    if (activeIndex === i) return;
    items[activeIndex].classList.remove('active');
    items[i].classList.add('active');
    activeIndex = i;
    bubbleTarget = centers[i];
  }

  items.forEach((item, i) => {
    item.addEventListener('click', (e) => {
      e.preventDefault();
      setActive(i);
    });
    item.addEventListener('focus', () => {
      pointerX = centers[i];
      setTargets();
      showTooltip(i);
    });
    item.addEventListener('blur', () => {
      pointerX = null;
      setTargets();
      hideTooltip();
    });
  });

  function showTooltip(i){
    tooltip.textContent = items[i].dataset.label;
    tooltip.style.left = centers[i] + 'px';
    tooltip.classList.add('show');
  }
  function hideTooltip(){ tooltip.classList.remove('show'); }

  dock.addEventListener('mousemove', (e) => {
    pointerX = e.clientX - dockRect.left;
    liquidTargetX = pointerX - 48;
    liquidTargetOp = 1;
    setTargets();

    // tooltip follows nearest item under cursor
    let nearest = 0, best = Infinity;
    centers.forEach((c, i) => {
      const d = Math.abs(pointerX - c);
      if (d < best){ best = d; nearest = i; }
    });
    if (best < 30) showTooltip(nearest); else hideTooltip();
  });

  dock.addEventListener('mouseenter', () => { liquidTargetOp = 1; });

  dock.addEventListener('mouseleave', () => {
    pointerX = null;
    liquidTargetOp = 0;
    setTargets();
    hideTooltip();
  });

  // touch support: light tap-magnify without persistent hover
  dock.addEventListener('touchstart', (e) => {
    const t = e.touches[0];
    pointerX = t.clientX - dockRect.left;
    liquidTargetX = pointerX - 48;
    liquidTargetOp = 1;
    setTargets();
  }, { passive: true });

  dock.addEventListener('touchend', () => {
    pointerX = null;
    liquidTargetOp = 0;
    setTargets();
  });

  function animate(){
    const ease = reduceMotion ? 1 : 0.18;

    items.forEach((item, i) => {
      const s = state[i];
      s.scale += (s.tScale - s.scale) * ease;
      s.lift  += (s.tLift  - s.lift)  * ease;
      const t = `translateY(${s.lift}px) scale(${s.scale})`;
      item.style.transform = t;
      // reflection mirrors the scale, eases its own lift inverted for a "rippling" feel
      const r = reflItems[i];
      if (r) r.style.transform = `scale(${0.94 + (s.scale - 1) * 0.5})`;
    });

    liquidX += (liquidTargetX - liquidX) * 0.16;
    liquidOp += (liquidTargetOp - liquidOp) * 0.14;
    liquid.style.transform = `translateX(${liquidX}px)`;
    liquid.style.opacity = liquidOp;

    bubbleX += (bubbleTarget - bubbleX) * 0.2;
    bubble.style.transform = `translateX(${bubbleX - 3}px)`;

    requestAnimationFrame(animate);
  }
  requestAnimationFrame(animate);
})();
</script>
</body>
</html>
